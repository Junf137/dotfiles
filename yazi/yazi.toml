[opener]
view_image = [
  { run = 'view-image "$@"; read -n 1', block = true, for = "unix", desc = "View in terminal" },
]

[open]
prepend_rules = [
  { mime = "image/*", use = "view_image" },
]

[[plugin.prepend_fetchers]]
id    = "git"
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
id    = "git"
url   = "*/"
run   = "git"
group = "git"
